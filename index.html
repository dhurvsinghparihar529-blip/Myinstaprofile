<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1136 Simplechhora</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f0f;
color:white;
}

.header{
text-align:center;
padding:30px 20px;
}

.profile-img{
width:130px;
height:130px;
border-radius:50%;
border:4px solid #ff006a;
object-fit:cover;
}

.username{
font-size:30px;
font-weight:bold;
margin-top:15px;
}

.bio{
color:#cccccc;
margin-top:10px;
font-size:15px;
line-height:25px;
}

.location-text{
color:#ff9800;
font-weight:bold;
margin-top:8px;
font-size:18px;
}

.stats{
display:flex;
justify-content:center;
gap:30px;
margin-top:20px;
}

.stat-box{
text-align:center;
}

.stat-number{
font-size:22px;
font-weight:bold;
}

.buttons{
margin-top:25px;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:12px;
}

.btn{
padding:12px 22px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
color:white;
transition:0.3s;
display:inline-block;
}

.insta{
background:#E1306C;
}

.whatsapp{
background:#25D366;
}

.call{
background:#ff9800;
}

.youtube{
background:red;
}

.location{
background:#673ab7;
}

.btn:hover{
transform:scale(1.05);
}

.section-title{
padding-left:15px;
margin-top:25px;
font-size:22px;
font-weight:bold;
}

.posts{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:15px;
}

.posts img{
width:100%;
height:160px;
object-fit:cover;
border-radius:6px;
}

.footer{
text-align:center;
padding:20px;
color:#888;
font-size:14px;
}

/* Mobile Responsive */

@media(max-width:600px){

.username{
font-size:24px;
}

.bio{
font-size:14px;
}

.stats{
gap:20px;
}

.posts{
grid-template-columns:repeat(2,1fr);
padding:10px;
}

.posts img{
height:140px;
}

.btn{
padding:10px 16px;
font-size:14px;
}

}

</style>
</head>
